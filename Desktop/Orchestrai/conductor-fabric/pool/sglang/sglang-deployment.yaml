apiVersion: apps/v1
kind: Deployment
metadata:
  name: conductor-sglang
  labels:
    app: conductor-sglang
    component: conductor
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: conductor-sglang
  template:
    metadata:
      labels:
        app: conductor-sglang
    spec:
      containers:
        - name: sglang
          image: lmsysorg/sglang:latest
          args:
            - "--model-path"
            - "google/gemma-3-12b-it"
            - "--context-length"
            - "32768"
            - "--port"
            - "8080"
            - "--trust-remote-code"
          ports:
            - containerPort: 8080
          resources:
            limits:
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: conductor-sglang
  labels:
    app: conductor-sglang
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: conductor-sglang
